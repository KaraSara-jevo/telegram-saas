services:
  nginx:
    image: nginx:alpine
    container_name: telegram-saas-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./user-service:/var/www/user-service
      - ./inventory-service:/var/www/inventory-service
      - ./sales-service:/var/www/sales-service
    depends_on:
      - user-service
      - inventory-service
      - sales-service
    networks:
      - telegram-saas-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: telegram-saas-user-service
    ports:
      - "8001:9000"
    volumes:
      - ./user-service:/var/www
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=user_service_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - mysql
    networks:
      - telegram-saas-network

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: telegram-saas-inventory-service
    ports:
      - "8002:9000"
    volumes:
      - ./inventory-service:/var/www
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=inventory_service_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - mysql
    networks:
      - telegram-saas-network

  sales-service:
    build:
      context: ./sales-service
      dockerfile: Dockerfile
    container_name: telegram-saas-sales-service
    ports:
      - "8003:9000"
    volumes:
      - ./sales-service:/var/www
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=sales_service_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - mysql
    networks:
      - telegram-saas-network

  mysql:
    image: mysql:5.7
    container_name: telegram-saas-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=user_service_db
      - MYSQL_DATABASE_2=inventory_service_db
      - MYSQL_DATABASE_3=sales_service_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - telegram-saas-network

volumes:
  mysql_data:

networks:
  telegram-saas-network:
    driver: bridge
